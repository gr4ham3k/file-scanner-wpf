  assemblies:
  - FileScannerAppWpf
  namespace: FileScannerApp
  summary: Przenosi albo kopiuje pliki do folderu docelowego zgodnie z wybranymi filtrami i opcjami.
  remarks: >-
    Metoda laczy kilka decyzji uzytkownika: wybrane typy plikow, tryb kopiowania lub przenoszenia,

    tworzenie podfolderow oraz podglad nowych nazw. Gdy plik docelowy juz istnieje, konflikt jest

    rozwiazywany przez nadpisanie albo dopisanie licznika do nazwy.
  example: []
  syntax:
    content: public static string OrganizeFiles(List<FileData> files, string sourceFolder, string destinationFolder, List<string> fileTypes, string operation, bool createSubfolders, bool overwriteExisting, Database db, List<RenamePreview> previews)
    parameters:
    - id: files
      type: System.Collections.Generic.List{FileScannerApp.Models.FileData}
      description: Pliki dostepne do organizowania.
    - id: sourceFolder
      type: System.String
      description: Folder zrodlowy, ktory musi istniec przed rozpoczeciem operacji.
    - id: destinationFolder
      type: System.String
      description: Folder docelowy; zostanie utworzony, jesli nie istnieje.
    - id: fileTypes
      type: System.Collections.Generic.List{System.String}
      description: Lista rozszerzen dopuszczonych do organizowania; pusta lista oznacza brak filtrowania.
    - id: operation
      type: System.String
      description: 'Tryb operacji: "move" oznacza przeniesienie, pozostale wartosci powoduja kopiowanie.'
    - id: createSubfolders
      type: System.Boolean
      description: Okresla, czy pliki maja zostac rozdzielone do podfolderow wedlug typu.
    - id: overwriteExisting
      type: System.Boolean
      description: Okresla, czy istniejace pliki w folderze docelowym moga zostac nadpisane.
    - id: db
      type: FileScannerApp.Database
      description: Baza danych uzywana do zapisu historii operacji; moze byc null.
    - id: previews
      type: System.Collections.Generic.List{FileScannerApp.Models.RenamePreview}
      description: Podglad nowych nazw przygotowany przed wykonaniem operacji.
    return:
      type: System.String
      description: Sciezka folderu docelowego, do ktorego organizowano pliki.
    content.vb: Public Shared Function OrganizeFiles(files As List(Of FileData), sourceFolder As String, destinationFolder As String, fileTypes As List(Of String), operation As String, createSubfolders As Boolean, overwriteExisting As Boolean, db As Database, previews As List(Of RenamePreview)) As String
  overload: FileScannerApp.Organizer.OrganizeFiles*
  exceptions:
  - type: System.IO.DirectoryNotFoundException
    commentId: T:System.IO.DirectoryNotFoundException
    description: Wyrzucany, gdy folder zrodlowy nie istnieje.
