  assemblies:
  - FileScannerAppWpf
  namespace: FileScannerApp
  summary: Zapisuje wynik skanowania pojedyńczego pliku.
  remarks: >-
    W bazie przechowywany jest zarówno uproszczony status, jak i surowa odpowiedź API.

    Surowy JSON pozwala później odczytac dodatkowe informacje, na przyklad liczbe silników

    oznaczających plik jako złosliwy.
  example: []
  syntax:
    content: public void SaveScanResult(int scanId, string fileName, string status, string apiResponse)
    parameters:
    - id: scanId
      type: System.Int32
      description: Identyfikator skanu, do którego należy wynik.
    - id: fileName
      type: System.String
      description: Nazwa analizowanego pliku.
    - id: status
      type: System.String
      description: Status ustalony przez aplikacje, na przyklad Completed, Malicious albo Error.
    - id: apiResponse
      type: System.String
      description: Odpowiedź API VirusTotal albo opis błędu zapisany dla danego pliku.
