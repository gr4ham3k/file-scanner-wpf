  namespace: FileScannerApp
  summary: Buduje nową nazwę pliku na podstawie wzorca i danych oryginalnego pliku.
  remarks: >-
    Wzorzec moze zawierać znaczniki: {name}, {created}, {modified}, {counter},

    {counter:000}, {folder} oraz {ext}. Oryginalne rozszerzenie jest dopisywane na końcu,

    aby zmiana nazwy nie zmieniała typu pliku.
  example: []
  syntax:
    content: public static string GenerateNewName(string pattern, string originalPath, int counter, string option)
    parameters:
    - id: pattern
      type: System.String
      description: Wzorzec nowej nazwy; pusty wzorzec pozostawia nazwę bez zmian.
    - id: originalPath
      type: System.String
      description: Pełna ścieżka oryginalnego pliku.
    - id: counter
      type: System.Int32
      description: Numer porządkowy używany w znacznikach licznika.
    - id: option
      type: System.String
      description: 'Opcja formatowania tekstu: "upper", "lower", "capitalize" albo brak zmiany.'
    return:
      type: System.String
      description: Nowa nazwa pliku wraz z oryginalnym rozszerzeniem.
    content.vb: Public Shared Function GenerateNewName(pattern As String, originalPath As String, counter As Integer, [option] As String) As String
