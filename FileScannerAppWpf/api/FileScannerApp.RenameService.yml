  summary: Przygotowuje listę podglądu nazw dla plików znajdujących się w folderze.
  remarks: >-
    Metoda nie zmienia nazw plików na dysku. Tworzy jedynie dane pomocnicze, ktore mogą zostać

    pokazane użytkownikowi przed wykonaniem faktycznej operacji zmiany nazw lub organizowania.
  example: []
  syntax:
    content: public static List<RenamePreview> LoadPreview(string path)
    parameters:
    - id: path
      type: System.String
      description: Folder, z którego mają zostać pobrane pliki do podglądu.
    return:
      type: System.Collections.Generic.List{FileScannerApp.Models.RenamePreview}
      description: Lista obiektow zawierających obecną nazwę pliku oraz miejsce na nazwę po zmianie.
    content.vb: Public Shared Function LoadPreview(path As String) As List(Of RenamePreview)
