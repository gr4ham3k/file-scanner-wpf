  assemblies:
  - FileScannerAppWpf
  namespace: FileScannerApp.Services
  summary: Oblicza skrot SHA-256 pliku, ktory jest uzywany jako identyfikator w usludze VirusTotal.
  remarks: >-
    API VirusTotal pozwala sprawdzic plik po jego skrocie, bez wysylania zawartosci pliku.

    Metoda wymaga istniejacej sciezki, poniewaz otwiera plik bezposrednio z dysku.
  example: []
  syntax:
    content: public string CalculateSHA256(string filePath)
    parameters:
    - id: filePath
      type: System.String
      description: Pelna sciezka do pliku, dla ktorego ma zostac obliczony skrot.
    return:
      type: System.String
      description: Skrot SHA-256 zapisany malymi literami bez separatorow.
    content.vb: Public Function CalculateSHA256(filePath As String) As String
