    startLine: 163
  assemblies:
  - FileScannerAppWpf
  namespace: FileScannerApp.Services
  summary: Pobiera raport VirusTotal dla pliku zidentyfikowanego przez skrot.
  remarks: >-
    Gdy VirusTotal nie zna danego skrotu, metoda zwraca null. Inne bledy HTTP sa przekazywane dalej,

    poniewaz moga oznaczac problem z kluczem API, limitem zapytan albo dostepnoscia uslugi.
  example: []
  syntax:
    content: public Task<string> GetFileReportAsync(string fileHash)
    parameters:
    - id: fileHash
      type: System.String
      description: Skrot SHA-256 pliku sprawdzanego w VirusTotal.
    return:
      type: System.Threading.Tasks.Task{System.String}
      description: Odpowiedz API w formacie JSON albo null, gdy raport nie istnieje.
    content.vb: Public Function GetFileReportAsync(fileHash As String) As Task(Of String)
