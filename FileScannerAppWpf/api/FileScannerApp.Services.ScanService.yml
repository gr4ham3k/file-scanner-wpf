    id: HasInternet
    path: Services/ScannerService.cs
    startLine: 194
  assemblies:
  - FileScannerAppWpf
  namespace: FileScannerApp.Services
  summary: Sprawdza, czy aplikacja ma podstawowy dostep do internetu.
  remarks: >-
    Metoda wykonuje krotkie zapytanie testowe i zwraca false przy dowolnym bledzie, aby interfejs

    mogl bezpiecznie poinformowac uzytkownika o braku polaczenia bez przerywania aplikacji wyjatkiem.
  example: []
  syntax:
    content: public static Task<bool> HasInternet()
    return:
      type: System.Threading.Tasks.Task{System.Boolean}
      description: True, gdy testowe zapytanie HTTP zakonczylo sie powodzeniem; w przeciwnym razie false.
    content.vb: Public Shared Function HasInternet() As Task(Of Boolean)
