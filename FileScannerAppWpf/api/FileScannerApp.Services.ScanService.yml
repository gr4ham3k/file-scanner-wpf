  commentId: M:FileScannerApp.Services.ScanService.ScanFilesAsync(System.Collections.Generic.List{FileScannerApp.Models.FileData},System.Int32,System.Func{FileScannerApp.Models.ScanProgress,System.Threading.Tasks.Task})
