  type: Method
  source:
    remote:
      path: FileScannerAppWpf/Services/ScannerService.cs
      branch: main
      repo: https://github.com/gr4ham3k/file-scanner-wpf.git
    id: ScanFilesAsync
    path: Services/ScannerService.cs
    startLine: 72
  assemblies:
  - FileScannerAppWpf
  namespace: FileScannerApp.Services
  summary: Skanuje kolekcje plikow, zapisuje wyniki i przekazuje postep do interfejsu uzytkownika.
  remarks: >-
    Dla kazdego istniejacego pliku obliczany jest skrot SHA-256, a nastepnie pobierany jest raport

    z VirusTotal. Bledy pojedynczych plikow sa zapisywane jako wynik skanowania, aby awaria jednego

    pliku nie przerywala calego procesu. Po kazdym pliku wywolywany jest callback postepu.
  example: []
  syntax:
    content: public Task<int> ScanFilesAsync(List<FileData> files, int scanId, Func<ScanProgress, Task> onProgress)
    parameters:
    - id: files
      type: System.Collections.Generic.List{FileScannerApp.Models.FileData}
      description: Lista plikow wybranych do skanowania.
    - id: scanId
      type: System.Int32
      description: Identyfikator skanu, do ktorego zostana przypisane wyniki.
    - id: onProgress
      type: System.Func{FileScannerApp.Models.ScanProgress,System.Threading.Tasks.Task}
      description: Funkcja wywolywana po przetworzeniu kolejnego pliku.
    return:
      type: System.Threading.Tasks.Task{System.Int32}
      description: Liczba plikow oznaczonych jako potencjalnie zlosliwe.
    content.vb: Public Function ScanFilesAsync(files As List(Of FileData), scanId As Integer, onProgress As Func(Of ScanProgress, Task)) As Task(Of Integer)
