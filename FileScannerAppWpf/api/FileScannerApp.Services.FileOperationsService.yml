  namespace: FileScannerApp.Services
  summary: Przenosi pliki do wybranego folderu docelowego i zwraca zaktualizowane ścieżki.
  remarks: >-
    Metoda pomija pliki, ktore nie istnieją, oraz pliki powodujące konflikt nazwy w folderze docelowym.

    Udane przeniesienia są zapisywane w historii jako operacje możliwe do cofnięcia.
  example: []
  syntax:
    content: public (int moved, int skipped, List<(string oldPath, string newPath)> updatedPaths) MoveFiles(List<string> paths, string targetFolder)
    parameters:
    - id: paths
      type: System.Collections.Generic.List{System.String}
      description: Lista ścieżek plików do przeniesienia.
    - id: targetFolder
      type: System.String
      description: Folder, do którego mają trafić pliki.
    return:
      type: System.ValueTuple{System.Int32,System.Int32,System.Collections.Generic.List{System.ValueTuple{System.String,System.String}}}
      description: Liczba przeniesionych plików, liczba pominiętych plików oraz lista zmian ścieżek.
    content.vb: Public Function MoveFiles(paths As List(Of String), targetFolder As String) As (moved As Integer, skipped As Integer, updatedPaths As List(Of (oldPath As String, newPath As String)))
