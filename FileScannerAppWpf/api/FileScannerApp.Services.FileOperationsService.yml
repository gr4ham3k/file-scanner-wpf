    parameters:
    - id: paths
      type: System.Collections.Generic.List{System.String}
      description: Ścieżki plików przeznaczonych do usunięcia z widoku użytkownika.
    return:
      type: System.ValueTuple{System.Int32,System.Int32}
      description: Liczba plików przeniesionych do kosza oraz liczba operacji nieudanych.
